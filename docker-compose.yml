services:
  postgres:
    image: postgres:16-alpine
    container_name: sagesai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sagesai
      POSTGRES_USER: sagesai
      POSTGRES_PASSWORD: sagesai_dev_password
    ports:
      - "5432:5432"
    volumes:
      - sagesai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sagesai -d sagesai"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: sagesai-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - sagesai_prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: sagesai-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - sagesai_grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  sagesai_postgres_data:
  sagesai_prometheus_data:
  sagesai_grafana_data: