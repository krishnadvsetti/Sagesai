services:
  platform-api:
    build:
      context: ./apps/platform-api
      dockerfile: Dockerfile
    container_name: sagesai-platform-api
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: sagesai
      DATABASE_USER: sagesai
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANOMALY_SERVICE_URL: http://anomaly-service:8001
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      anomaly-service:
        condition: service_healthy

  anomaly-service:
    build:
      context: ./services/anomaly-service
      dockerfile: Dockerfile
    container_name: sagesai-anomaly-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: sagesai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sagesai
      POSTGRES_USER: sagesai
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - sagesai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sagesai -d sagesai"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: sagesai-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - sagesai_prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: sagesai-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - sagesai_grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  sagesai_postgres_data:
  sagesai_prometheus_data:
  sagesai_grafana_data:
